<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus SOAR | Authentication</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; height: 100vh; background-color: var(--bg-dark); }
        .login-card { background: var(--panel-bg); border: 1px solid var(--cyan); border-radius: 8px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 0 20px rgba(57, 197, 255, 0.2); }
        .form-control { background-color: #010409; border: 1px solid #30363d; color: white; }
        .form-control:focus { background-color: #0d1219; color: white; border-color: var(--cyan); box-shadow: 0 0 5px rgba(57, 197, 255, 0.5); }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <h3 class="text-cyan fw-bold mb-4"><i class="fa-solid fa-satellite-dish"></i> Nexus SOAR</h3>
        
        {% if error %}
        <div class="alert alert-danger py-2 small fw-bold"><i class="fa-solid fa-triangle-exclamation"></i> {{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="mb-3 text-start">
                <label class="form-label text-muted small fw-bold">OPERATOR ID</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary text-cyan"><i class="fa-solid fa-user"></i></span>
                    <input type="text" name="username" class="form-control" required autocomplete="off" placeholder="admin">
                </div>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label text-muted small fw-bold">AUTHORIZATION PASSCODE</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary text-cyan"><i class="fa-solid fa-key"></i></span>
                    <input type="password" name="password" class="form-control" required placeholder="••••••••">
                </div>
            </div>
            <button type="submit" class="btn btn-outline-info w-100 fw-bold"><i class="fa-solid fa-right-to-bracket"></i> INITIALIZE SESSION</button>
        </form>
        <div class="mt-4 text-muted small">RESTRICTED GOVERNMENT & ENTERPRISE ACCESS ONLY</div>
    </div>
</body>
</html>
